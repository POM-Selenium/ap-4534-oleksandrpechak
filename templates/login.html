{% extends 'base.html' %}

{% block title %}Login - MySite{% endblock %}

{% block extra_css %}
<style>
    .login-form {
        max-width: 400px; margin: 0 auto;
    }
    .login-form h2 { text-align: center; margin-bottom: 25px; color: #2c3e50; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
        display: block; margin-bottom: 6px; font-weight: 600; color: #555;
    }
    .form-group input {
        width: 100%; padding: 10px 14px; border: 1px solid #ddd;
        border-radius: 4px; font-size: 1em; transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: #3498db; outline: none; }
    .btn-login {
        width: 100%; padding: 12px; background: #3498db; color: #fff;
        border: none; border-radius: 4px; font-size: 1.1em;
        cursor: pointer; transition: background 0.3s;
    }
    .btn-login:hover { background: #2980b9; }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div class="login-form">
        <h2>Login</h2>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login" id="login-submit">Login</button>
        </form>
    </div>
</div>
{% endblock %}
