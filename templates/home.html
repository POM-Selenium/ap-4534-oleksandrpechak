{% extends 'base.html' %}

{% block title %}Home - MySite{% endblock %}

{% block content %}
<div class="card">
    {% if user.is_authenticated %}
        <h1>Welcome, {{ user.username }}!</h1>
        <p>You are logged in.</p>
    {% else %}
        <h1>Welcome to MySite</h1>
        <p>Please <a href="{% url 'login' %}">login</a> to continue.</p>
    {% endif %}
</div>
{% endblock %}
